{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <h2>Edit Personal Information</h2>

    <div class="card shadow-sm mt-3">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}


                <button class="btn btn-success">Save Changes</button>

                <a href="{% url 'users:profile' %}"
                   class="btn btn-outline-secondary"> 
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
