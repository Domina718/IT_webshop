{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="text-center mb-5">

        <h1>Welcome to IT Webshop</h1>

        <p class="text-muted">Find the best PC components and accessories</p>

        <a href="{% url 'shop:product_list' %}"
           class="btn btn-primary">
            View Products
        </a>
    
    </div>

    <h3 class="mb-3">Latest Products</h3>

    <div class="row">

        {% for product in products %}

            <div class="col-md-3 mb-4">

                <div class="card h-100 shadow-sm">

                    {% if product.image %}

                    <img src="{{ product.image.url }}"
                         class="card-img-top home-product-image">

                    {% endif %}

                    <div class="card-body">

                        <h5 class="card-title">

                            {{ product.name }}

                        </h5>

                        <p>{{ product.price }} €</p>

                        <a href="{% url 'shop:product_detail' product.pk %}"
                           class="btn btn-outline-primary">
                            View
                        </a>

                    </div>

                </div>

            </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
