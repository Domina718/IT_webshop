{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-body">

            <h3>Reset password</h3>

            <p class="text-muted">
                Enter your email address and we will send instructions.
            </p>

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-primary">
                    Send reset email
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
